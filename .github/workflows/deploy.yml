name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploying to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Load environment variables (fixes 'npm: command not found')
            source ~/.bashrc
            export NVM_DIR=~/.nvm
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Go to the user's home directory
            cd ~
            
            # If the repository doesn't exist on the server, clone it
            if [ ! -d "refearn" ]; then
              echo "Repository not found. Cloning..."
              git clone https://github.com/share0acc0unt-ai/refearn.git
            fi
            
            # Navigate to the project directory
            cd refearn
            
            # Pull the latest changes from GitHub
            git checkout main
            git pull origin main
            
            # Navigate to the web application directory
            cd web
            
            # Install dependencies
            npm install
            
            # Build the Next.js application
            npm run build
            
            # Restart the PM2 process
            pm2 restart refearn-web || pm2 start npm --name "refearn-web" -- start
