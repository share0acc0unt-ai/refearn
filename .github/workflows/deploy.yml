name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploying to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ---- Load Node.js / npm / pm2 into PATH ----
            # This handles both nvm installs and system-level installs
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              \. "$NVM_DIR/nvm.sh"
            elif [ -f "/usr/local/bin/node" ]; then
              export PATH="/usr/local/bin:$PATH"
            elif [ -f "/usr/bin/node" ]; then
              export PATH="/usr/bin:$PATH"
            fi

            # Confirm node/npm/pm2 are visible (helps debug future issues)
            echo "Node: $(node -v)"
            echo "NPM:  $(npm -v)"
            echo "PM2:  $(pm2 -v)"

            # ---- Repository Setup ----
            cd ~

            # Clone if repo doesn't exist, otherwise pull latest
            if [ ! -d "refearn/.git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/share0acc0unt-ai/refearn.git
            fi

            cd refearn
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # ---- Build ----
            cd web

            # Install production dependencies
            npm ci

            # Build the Next.js application
            npm run build

            # ---- Process Management ----
            # Restart if running, otherwise start fresh
            pm2 describe refearn-web > /dev/null 2>&1 \
              && pm2 restart refearn-web \
              || pm2 start npm --name "refearn-web" -- start

            # Save pm2 process list so it survives reboots
            pm2 save
