name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploying to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ---- Install Node.js if not present ----
            if ! command -v node &> /dev/null; then
              echo "Node.js not found. Installing via NodeSource..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            echo "Node: $(node -v)"
            echo "NPM:  $(npm -v)"

            # ---- Install PM2 globally if not present ----
            if ! command -v pm2 &> /dev/null; then
              echo "PM2 not found. Installing..."
              sudo npm install -g pm2
            fi

            echo "PM2: $(pm2 -v)"

            # ---- Repository Setup ----
            cd ~

            # Clone if repo doesn't exist
            if [ ! -d "refearn/.git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/share0acc0unt-ai/refearn.git
            fi

            cd refearn
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # ---- Build ----
            cd web

            # Install dependencies
            npm ci

            # Build the Next.js application
            npm run build

            # ---- Process Management ----
            if pm2 describe refearn-web > /dev/null 2>&1; then
              pm2 restart refearn-web
            else
              pm2 start npm --name "refearn-web" -- start
            fi

            # Save pm2 process list so it survives server reboots
            pm2 save
            sudo env PATH=$PATH:/usr/bin pm2 startup systemd -u $USER --hp $HOME || true
