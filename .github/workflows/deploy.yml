name: Deploy PayPulse to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            # ---- Install Docker if not present ----
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
              echo "Docker installed."
            fi
            echo "Docker: $(sudo docker --version)"

            # ---- Ensure Docker Compose plugin is available ----
            if ! sudo docker compose version &> /dev/null 2>&1; then
              echo "Installing Docker Compose plugin..."
              sudo apt-get install -y docker-compose-plugin
            fi
            echo "Compose: $(sudo docker compose version)"

            # ---- Clone or update repo ----
            cd ~
            if [ ! -d "refearn/.git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/share0acc0unt-ai/refearn.git
            fi

            cd refearn
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # ---- Write .env.local from GitHub secrets ----
            # All secrets injected at runtime — nothing is baked into the Docker image.
            printf "MONGODB_URI=%s\nJWT_SECRET=%s\nNEXT_PUBLIC_APP_URL=%s\nCLOUDINARY_CLOUD_NAME=%s\nCLOUDINARY_API_KEY=%s\nCLOUDINARY_API_SECRET=%s\n" \
              "${{ secrets.MONGODB_URI }}" \
              "${{ secrets.JWT_SECRET }}" \
              "${{ secrets.NEXT_PUBLIC_APP_URL }}" \
              "${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
              "${{ secrets.CLOUDINARY_API_KEY }}" \
              "${{ secrets.CLOUDINARY_API_SECRET }}" > ~/refearn/web/.env.local
            echo ".env.local written with $(wc -l < ~/refearn/web/.env.local) lines."

            # ---- Stop existing containers ----
            cd web
            sudo docker compose down || true

            # ---- Build and start containers ----
            sudo docker compose up --build -d

            # ---- Show running containers ----
            echo ""
            echo "=============================="
            echo "  Running containers:"
            echo "=============================="
            sudo docker compose ps

            # ---- Show app logs (last 50 lines) ----
            echo ""
            echo "=============================="
            echo "  App logs:"
            echo "=============================="
            sudo docker compose logs app --tail=50
