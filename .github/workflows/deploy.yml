name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploying to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project directory (Update this path to your actual project folder on EC2)
            cd /home/ubuntu/refearn
            
            # Pull the latest changes from GitHub
            git pull origin main
            
            # Navigate to the web application directory
            cd web
            
            # Install dependencies
            npm install
            
            # Build the Next.js application
            npm run build
            
            # Restart the PM2 process (Replace 'refearn-web' with your actual PM2 process name)
            pm2 restart refearn-web || pm2 start npm --name "refearn-web" -- start
