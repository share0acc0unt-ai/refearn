services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paypulse-app
    restart: unless-stopped
    # .env.local is written on the server by the GitHub Actions workflow.
    # It contains MONGODB_URI, JWT_SECRET, CLOUDINARY_*, NEXT_PUBLIC_APP_URL
    env_file:
      - .env.local
    expose:
      - "3000"
    networks:
      - paypulse-net

  nginx:
    image: nginx:alpine
    container_name: paypulse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - paypulse-net

networks:
  paypulse-net:
    driver: bridge
